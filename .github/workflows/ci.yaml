on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yaml"
      - "cmd/**"
      - "scripts/**"
      - "stats/**"
      - ".dockerignore"
      - "docker-bake.hcl"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "main.go"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      TAG: edge
      BUILD_ID: r${{ github.run_id }}
      BUILD_HASH: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Set build timestamp
        run: |
          echo "BUILD_TIMESTAMP=$(git log -1 --format=%cI)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/setup-buildx-action@v4
      - uses: docker/bake-action@v7
        with:
          source: .
          targets: test
          set: |
            test.cache-from=type=gha,scope=test
            test.cache-to=type=gha,scope=test,mode=max
      - uses: docker/bake-action@v7
        with:
          source: .
          targets: build
          set: |
            build.cache-from=type=gha,scope=test
            build.cache-from=type=gha,scope=build
            build.cache-to=type=gha,scope=build,mode=max
      - uses: docker/bake-action@v7
        id: push
        with:
          source: .
          targets: app
          set: |
            app.platform=linux/arm64
            app.platform=linux/amd64
            app.output=type=registry

      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ fromJSON(steps.push.outputs.metadata)['app']['containerimage.digest'] }}
          push-to-registry: true

      - name: Upload Release Assets
        if: github.event_name == 'workflow_dispatch' && inputs.release
        run: |
          RELEASE_TAG=$(date -u -d "$BUILD_TIMESTAMP" +'%y%m%d')
          ./build/tegra-exporter-arm64 version
          if gh release view "$RELEASE_TAG" &>/dev/null; then
            gh release upload "$RELEASE_TAG" --clobber \
              ./build/tegra-exporter-arm64 \
              ./build/tegra-exporter-amd64
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" \
              ./build/tegra-exporter-arm64 \
              ./build/tegra-exporter-amd64
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
