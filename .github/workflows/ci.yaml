on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    env:
      BUILD_ID: ${{ github.run_id }}
      BUILD_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          ./scripts/gen-version-file.sh

      - uses: docker/setup-buildx-action@v4
      - uses: docker/bake-action@v7
        with:
          targets: test
      - uses: docker/bake-action@v7
        with:
          targets: app
          set: |
            app.output=type=local,dest=./dist

      - name: Upload Release Assets
        if: github.event_name == 'release'
        run: |
          ./dist/tegra-exporter version
          gh release upload ${{ github.event.release.tag_name }} ./dist/tegra-exporter
        env:
          GH_TOKEN: ${{ github.token }}
