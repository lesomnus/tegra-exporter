stat: ["bash", "./scripts/date.sh"]

otel:
  exporters:
    pretty: {}
    otlp/local:
      endpoint: localhost:4317
      tls:
        insecure: true
      sending_queue:
        enabled: false
    prometheus/local:
      endpoint: ":8888"
      namespace: tegra_exporter

  providers:
    meter:
      processors:
        - resource/tegra-exporter
      exporters:
        - otlp/local
        - prometheus/local
    logger:
      exporters:
        - pretty
